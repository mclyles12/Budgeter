<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Budget AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b09;
    --surface: #161512;
    --card: #1e1c18;
    --border: #2a2820;
    --gold: #c8a84b;
    --gold-light: #e8c97a;
    --green: #5dab7f;
    --red: #c45f5f;
    --text: #ede8df;
    --muted: #6b6760;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 1.2rem;
    color: var(--gold-light);
  }
  .header-badges { display: flex; gap: 8px; }
  .badge {
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .badge.green { border-color: var(--green); color: var(--green); }
  .badge.gold { border-color: var(--gold); color: var(--gold); }

  /* GOAL BAR */
  .goal-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    flex-shrink: 0;
  }
  .goal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .goal-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .goal-amount { font-size: 0.75rem; color: var(--gold); }
  .progress-track {
    background: var(--border);
    border-radius: 99px;
    height: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* PANELS */
  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .panel.active { display: flex; }

  /* CHAT */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; flex-direction: column; max-width: 88%; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.8rem;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: #1e2b1a;
    border: 1px solid #2e4228;
    color: #b8e8c8;
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-time { font-size: 0.58rem; color: var(--muted); margin-top: 3px; padding: 0 4px; }

  .typing-indicator .bubble { padding: 14px; }
  .dots { display: flex; gap: 4px; }
  .dot {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .chat-input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .input-controls {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #chatInput {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 14px;
    outline: none;
    resize: none;
    height: 42px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #chatInput:focus { border-color: var(--gold-dim); }
  #chatInput::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--gold);
    border: none;
    border-radius: 10px;
    color: var(--bg);
    cursor: pointer;
    font-size: 1rem;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .send-btn:hover { background: var(--gold-light); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* LEDGER TAB */
  .ledger-scroll { flex: 1; overflow-y: auto; padding: 16px; }
  .ledger-month { margin-bottom: 20px; }
  .ledger-month-title {
    font-family: 'Fraunces', serif;
    font-size: 0.9rem;
    color: var(--gold-light);
    font-style: italic;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .ledger-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .ls-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .ls-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
  .ls-val { font-size: 0.9rem; font-family: 'Fraunces', serif; font-weight: 700; }
  .ls-val.red { color: var(--red); }
  .ls-val.green { color: var(--green); }
  .ls-val.gold { color: var(--gold); }

  .tx-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    animation: fadeUp 0.2s ease;
  }
  .tx-left { flex: 1; }
  .tx-name { font-size: 0.75rem; color: var(--text); }
  .tx-meta { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
  .tx-amount { font-size: 0.8rem; font-weight: 500; }
  .tx-amount.expense { color: var(--red); }
  .tx-amount.income { color: var(--green); }
  .tx-amount.savings { color: var(--gold); }
  .tx-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.65rem;
    padding: 2px 6px;
    margin-left: 8px;
    border-radius: 4px;
    width: auto;
    height: auto;
    transition: color 0.2s;
  }
  .tx-del:hover { color: var(--red); background: none; }
  .empty-ledger {
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    padding: 40px 20px;
    line-height: 2;
  }

  /* BILLS TAB */
  .bills-scroll { flex: 1; overflow-y: auto; padding: 16px; }
  .section-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .section-label:first-child { margin-top: 0; }
  .bills-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .bill-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }
  .bill-row:last-child { border-bottom: none; }
  .bill-name { color: var(--text); }
  .bill-amt { color: var(--gold); }
  .bill-row.total { background: #1a1812; }
  .bill-row.total .bill-name { color: var(--muted); font-size: 0.62rem; text-transform: uppercase; }
  .bill-row.total .bill-amt { color: var(--red); }
  .debt-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; }
  .debt-name { font-size: 0.78rem; color: var(--text); margin-bottom: 3px; }
  .debt-bottom { display: flex; justify-content: space-between; align-items: center; }
  .debt-status { font-size: 0.6rem; color: var(--muted); }
  .debt-amount { font-size: 0.85rem; color: var(--red); font-family: 'Fraunces', serif; font-weight: 700; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* SETTINGS PANEL */
  .goal-setup { margin-bottom: 20px; }
  .goal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .goal-title {
    font-size: 0.9rem;
    color: var(--gold-light);
    font-family: 'Fraunces', serif;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .goal-input-group {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .goal-prefix, .goal-suffix {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .goal-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 8px 12px;
    margin: 0 8px;
    flex: 1;
    outline: none;
  }
  .goal-input:focus { border-color: var(--gold); }
  .goal-btn {
    background: var(--gold);
    border: none;
    border-radius: 6px;
    color: var(--bg);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 8px 16px;
    transition: background 0.2s;
  }
  .goal-btn:hover { background: var(--gold-light); }

  .recurring-list { margin-bottom: 12px; }
  .recurring-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .recurring-info { flex: 1; }
  .recurring-name { font-size: 0.8rem; color: var(--text); margin-bottom: 2px; }
  .recurring-meta { font-size: 0.65rem; color: var(--muted); }
  .recurring-amount { font-size: 0.85rem; font-weight: 500; }
  .recurring-amount.expense { color: var(--red); }
  .recurring-amount.income { color: var(--green); }
  .recurring-actions { display: flex; gap: 6px; }
  .recurring-edit, .recurring-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.7rem;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .recurring-edit:hover { color: var(--gold); background: rgba(200, 168, 75, 0.1); }
  .recurring-delete:hover { color: var(--red); background: rgba(196, 95, 95, 0.1); }

  .add-recurring-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--gold);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 12px 16px;
    width: 100%;
    transition: all 0.2s;
  }
  .add-recurring-btn:hover { background: var(--card); border-color: var(--gold); }

  .strategy-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .strategy-option {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .strategy-option:last-child { margin-bottom: 12px; }
  .strategy-option input[type="radio"] {
    margin-right: 8px;
    accent-color: var(--gold);
  }
  .strategy-option label {
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
  }

  /* MODAL STYLES */
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(12, 11, 9, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    margin-bottom: 16px;
  }
  .modal-group { margin-bottom: 16px; }
  .modal-label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .modal-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
  }
  .modal-input:focus { border-color: var(--gold); }
  .modal-select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .modal-btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--gold); color: var(--bg); }
  .modal-btn.primary:hover { background: var(--gold-light); }
  .modal-btn.secondary { background: var(--border); color: var(--text); }
  .modal-btn.secondary:hover { background: var(--muted); }

  /* IMAGE UPLOAD */
  .image-preview {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    margin-top: 8px;
    border: 1px solid var(--border);
  }

  /* SPEECH TO TEXT */
  .voice-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--gold);
    cursor: pointer;
    font-size: 1rem;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .voice-btn:hover { border-color: var(--gold); background: rgba(200, 168, 75, 0.1); }
  .voice-btn.listening {
    background: var(--red);
    border-color: var(--red);
    color: white;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(100%); opacity: 0; }
  }
</style>
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <h1>💰 My Budget AI</h1>
    <div class="header-badges">
      <span class="badge green" id="snapBadge">SNAP Pending</span>
      <span class="badge gold">Dec Goal</span>
    </div>
  </div>
</div>

<!-- GOAL BAR -->
<div class="goal-bar">
  <div class="goal-row">
    <span class="goal-label" id="goalLabel">Saved toward $${savingsGoal}</span>
    <span class="goal-amount" id="goalDisplay">$0 / $6,000</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
  <div class="tab" onclick="switchTab('ledger')">📋 Ledger</div>
  <div class="tab" onclick="switchTab('bills')">🧾 Bills</div>
  <div class="tab" onclick="switchTab('settings')">⚙️ Settings</div>
</div>

<!-- CHAT PANEL -->
<div class="panel active" id="panel-chat">
  <div class="chat-messages" id="chatMessages">
    <div class="msg ai" id="welcomeMessage">
      <div class="bubble" id="welcomeBubble">Loading...</div>
      <div class="msg-time">Now</div>
    </div>
  </div>
  <div class="chat-input-area">
    <div class="input-controls">
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceInput()" title="Voice input">🎤</button>
      <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
      <button class="voice-btn" onclick="document.getElementById('imageInput').click()" title="Upload image">📷</button>
      <textarea id="chatInput" placeholder="Tell me about a purchase..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- LEDGER PANEL -->
<div class="panel" id="panel-ledger">
  <div class="ledger-scroll" id="ledgerContent"></div>
</div>

<!-- BILLS PANEL -->
<div class="panel" id="panel-bills">
  <div class="bills-scroll" id="billsContent">
    <!-- Content will be populated dynamically -->
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="panel-settings">
  <div class="bills-scroll">
    <div class="section-label">🎯 Financial Goals</div>
    <div class="goal-setup" id="goalSetup">
      <div class="goal-card">
        <div class="goal-title">Savings Goal</div>
        <div class="goal-input-group">
          <span class="goal-prefix">$</span>
          <input type="number" id="savingsGoal" placeholder="6000" class="goal-input" value="${savingsGoal}">
          <span class="goal-suffix">by Dec 2025</span>
        </div>
        <button class="goal-btn" onclick="updateSavingsGoal()">Update Goal</button>
      </div>
    </div>

    <div class="section-label">🔄 Recurring Items</div>
    <div class="recurring-list" id="recurringList">
      <!-- Recurring items will be populated here -->
    </div>
    <button class="add-recurring-btn" onclick="showAddRecurringModal()">+ Add Recurring Item</button>

    <div class="section-label">📊 Budget Strategy</div>
    <div class="strategy-card">
      <div class="strategy-option">
        <input type="radio" id="strategy-budget" name="budgetStrategy" value="budget" ${budgetStrategy === 'budget' ? 'checked' : ''}>
        <label for="strategy-budget">Stick to monthly budget</label>
      </div>
      <div class="strategy-option">
        <input type="radio" id="strategy-savings" name="budgetStrategy" value="savings" ${budgetStrategy === 'savings' ? 'checked' : ''}>
        <label for="strategy-savings">Focus on savings goal</label>
      </div>
      <button class="goal-btn" onclick="updateBudgetStrategy()">Update Strategy</button>
    </div>
  </div>
</div>

<script>
console.log('Script loaded successfully');

// Test basic functionality
window.testFunction = function() {
  console.log('Test function called');
  alert('JavaScript is working!');
};
function getSystemPrompt() {
  if (!isSetupComplete) {
    return `You are helping a user set up their budget tracking for the first time. Your goal is to gather comprehensive information about their finances through natural conversation.

Current setup step: ${setupStep + 1} of ${setupQuestions.length}

You should:
1. Ask one clear question at a time
2. Be encouraging and patient
3. Extract specific financial details from their responses
4. Move to the next logical question after getting a satisfactory answer
5. When you have enough information, summarize everything and confirm it's complete

The user has already provided some information in previous steps. Use this context to ask relevant follow-up questions.

When they give you information, respond positively and either:
- Ask the next question if more info is needed
- Summarize and confirm if setup is complete

Keep responses conversational and friendly, like a helpful financial advisor getting to know their client.`;
  }

  // Regular mode with user's actual financial data
  const strategy = budgetStrategy === 'savings' ? 
    `Focus on helping the user reach their $${savingsGoal} savings goal. Prioritize savings recommendations and warn about expenses that impact the goal.` :
    `Help the user stick to their monthly budget. Track spending against income and provide budget-conscious advice.`;

  return `You are a personal budget assistant AI embedded in a budget tracking app. You know everything about this user's finances:

INCOME:
${userProfile.income || 'To be determined during setup'}

FIXED MONTHLY BILLS: ${userProfile.monthlyBills || 'To be determined during setup'}

OUTSTANDING DEBTS:
${userProfile.debts || 'To be determined during setup'}

let transactions = JSON.parse(localStorage.getItem('budgetTx') || '[]');
let chatHistory = [];
let isLoading = false;
let recurringItems = JSON.parse(localStorage.getItem('budgetRecurring') || '[]');
let budgetStrategy = localStorage.getItem('budgetStrategy') || 'budget';
let savingsGoal = parseInt(localStorage.getItem('savingsGoal')) || 6000;
let isListening = false;
let recognition = null;

// Setup flow variables
let isSetupComplete = localStorage.getItem('setupComplete') === 'true';
let setupStep = parseInt(localStorage.getItem('setupStep')) || 0;
let userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
let setupQuestions = [
  "Hi! I'm your budget assistant. To give you the best help, I need to understand your financial situation. Let's start with your income. How many hours do you work per week and at what hourly rate?",
  "Great! Now tell me about any other income sources you have (side gigs, passive income, etc.) and their monthly amounts.",
  "Thanks! Now let's talk about your regular monthly expenses. What do you pay for housing (rent/mortgage)? If you live rent-free, just say 'none'.",
  "Good. What about transportation costs? Do you have car payments, insurance, or regular gas expenses?",
  "Okay. What about utilities and subscriptions? List any regular bills like phone, internet, streaming services, etc.",
  "Now for debts and larger obligations. Do you have any credit card debt, loans, or tax payments you're making?",
  "What's your savings goal? How much do you want to save and by when?",
  "Finally, is there anything else important about your finances I should know? (like upcoming changes, special circumstances, etc.)"
];
let setupResponses = {};

function fmt(n) {
  return '$' + Math.abs(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function getMonthKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${d.getMonth()}`;
}

function getCurrentMonthStats() {
  const now = new Date();
  const key = `${now.getFullYear()}-${now.getMonth()}`;
  const monthTx = transactions.filter(t => getMonthKey(t.date) === key);
  const spent = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const saved = monthTx.filter(t => t.type === 'savings').reduce((s, t) => s + t.amount, 0);
  return { spent, income, saved, count: monthTx.length };
}

function getTotalSaved() {
  return transactions.filter(t => t.type === 'savings').reduce((s, t) => s + t.amount, 0);
}

function updateGoalBar() {
  const saved = getTotalSaved();
  const pct = Math.min(100, (saved / savingsGoal) * 100);
  document.getElementById('goalDisplay').textContent = `${fmt(saved)} / $${savingsGoal}`;
  document.getElementById('goalLabel').textContent = `Saved toward $${savingsGoal}`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function addTransaction(tx) {
  transactions.unshift({ ...tx, id: Date.now() });
  localStorage.setItem('budgetTx', JSON.stringify(transactions));
  updateGoalBar();
  renderLedger();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  localStorage.setItem('budgetTx', JSON.stringify(transactions));
  updateGoalBar();
  renderLedger();
}

function renderLedger() {
  const container = document.getElementById('ledgerContent');
  if (transactions.length === 0) {
    container.innerHTML = '<div class="empty-ledger">No transactions yet.<br>Chat with your AI to log purchases!</div>';
    return;
  }

  const byMonth = {};
  transactions.forEach(t => {
    const d = new Date(t.date);
    const key = getMonthKey(t.date);
    const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    if (!byMonth[key]) byMonth[key] = { label, items: [] };
    byMonth[key].items.push(t);
  });

  container.innerHTML = Object.entries(byMonth).map(([key, { label, items }]) => {
    const spent = items.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const income = items.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const saved = items.filter(t => t.type === 'savings').reduce((s, t) => s + t.amount, 0);

    return `
      <div class="ledger-month">
        <div class="ledger-month-title">${label}</div>
        <div class="ledger-summary">
          <div class="ls-card"><div class="ls-label">Spent</div><div class="ls-val red">${fmt(spent)}</div></div>
          <div class="ls-card"><div class="ls-label">Income</div><div class="ls-val green">${fmt(income)}</div></div>
          <div class="ls-card"><div class="ls-label">Saved</div><div class="ls-val gold">${fmt(saved)}</div></div>
        </div>
        ${items.map(t => `
          <div class="tx-item">
            <div class="tx-left">
              <div class="tx-name">${t.description}</div>
              <div class="tx-meta">${new Date(t.date).toLocaleDateString('en-US', {month:'short',day:'numeric'})} · ${t.category || t.type}</div>
            </div>
            <div class="tx-amount ${t.type}">${t.type === 'expense' ? '-' : t.type === 'income' ? '+' : '🏦'}${fmt(t.amount)}</div>
            <button class="tx-del" onclick="deleteTransaction(${t.id})">✕</button>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function switchTab(tab) {

  try {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['chat','ledger','bills','settings'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById(`panel-${tab}`);

      panel.classList.add('active');
      console.log('Activated panel:', `panel-${tab}`);

function appendMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  div.innerHTML = `<div class="bubble">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/&lt;LOG&gt;.*?&lt;\/LOG&gt;/gs, '').trim()}</div><div class="msg-time">${time}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ai typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  console.log('sendMessage called');
  if (isLoading) {
    console.log('Already loading, returning');
    return;
  }
  
  const input = document.getElementById('chatInput');
  if (!input) {
    console.error('chatInput not found');
    return;
  }
  
  const text = input.value.trim();
  console.log('Input text:', text);
  if (!text) {
    console.log('No text, returning');
    return;
  }

  input.value = '';
  input.style.height = '42px';
  appendMessage('user', text);

  // Handle setup mode
  if (!isSetupComplete) {
    console.log('Processing setup response');
    processSetupResponse(text);
    return;
  }

  console.log('Sending to AI...');
  const stats = getCurrentMonthStats();
  const contextNote = `[Current month stats: spent $${stats.spent}, logged income $${stats.income}, saved $${stats.saved}. Total saved toward goal: $${getTotalSaved()}]`;

  chatHistory.push({ role: 'user', content: `${text}\n\n${contextNote}` });

  isLoading = true;
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        system: getSystemPrompt(),
        messages: chatHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.[0]?.text || "Sorry, I couldn't process that.";

    removeTyping();
    appendMessage('ai', fullText);
    chatHistory.push({ role: 'assistant', content: fullText });

    // Extract LOG if present
    const logMatch = fullText.match(/<LOG>(.*?)<\/LOG>/s);
    if (logMatch) {
      try {
        const tx = JSON.parse(logMatch[1]);
        addTransaction(tx);
        // Show confirmation
        setTimeout(() => {
          const container = document.getElementById('chatMessages');
          const conf = document.createElement('div');
          conf.className = 'msg ai';
          conf.innerHTML = `<div class="bubble" style="background:#1a2218;border-color:#2a4028;color:#6bbf8e;font-size:0.72rem;">✅ Logged: ${tx.description} · ${tx.type === 'expense' ? '-' : '+'}$${tx.amount}</div>`;
          container.appendChild(conf);
          container.scrollTop = container.scrollHeight;
        }, 300);
      } catch(e) {}
    }

  } catch (err) {
    removeTyping();
    appendMessage('ai', 'Connection error. Check your internet and try again.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

    html += `<div class="section-label">Transportation</div>
    <div class="bills-list">`;
    
    const transportLines = userProfile.transportation.split('\n');
    transportLines.forEach(line => {
      if (line.trim()) {
        html += `<div class="bill-row"><span class="bill-name">${line}</span></div>`;
      }
    });

  }

  // Utilities and Bills

    html += `<div class="section-label">Utilities & Subscriptions</div>
    <div class="bills-list">
      <div class="bill-row"><span class="bill-name">${userProfile.utilities}</span></div>
    </div>`;
  }

    html += `<div class="section-label">Outstanding Debts</div>`;

        const amountMatch = line.match(/\$?(\d+(?:,\d+)?(?:\.\d+)?)/);

function saveRecurringItem(editIndex = null) {
  const name = document.getElementById('itemName').value.trim();
  const amount = parseFloat(document.getElementById('itemAmount').value);
  const frequency = document.getElementById('itemFrequency').value;
  const type = document.getElementById('itemType').value;
  const category = document.getElementById('itemCategory').value.trim();

  if (!name || !amount || amount <= 0) {
    alert('Please fill in all required fields with valid values.');
    return;
  }

  const item = { name, amount, frequency, type, category: category || null };

  if (editIndex !== null) {
    recurringItems[editIndex] = item;
  } else {
    recurringItems.push(item);
  }

  localStorage.setItem('budgetRecurring', JSON.stringify(recurringItems));
  renderRecurringItems();
  closeModal();
  showNotification(`Recurring item ${editIndex !== null ? 'updated' : 'added'}!`);
}

function editRecurringItem(index) {
  showAddRecurringModal(index);
}

function deleteRecurringItem(index) {
  if (confirm('Are you sure you want to delete this recurring item?')) {
    recurringItems.splice(index, 1);
    localStorage.setItem('budgetRecurring', JSON.stringify(recurringItems));
    renderRecurringItems();
    showNotification('Recurring item deleted!');
  }
}

// Speech to Text
function toggleVoiceInput() {
  const voiceBtn = document.getElementById('voiceBtn');
  
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition is not supported in this browser.');
    return;
  }

  if (isListening) {
    stopVoiceInput();
  } else {
    startVoiceInput();
  }
}

function startVoiceInput() {
  const voiceBtn = document.getElementById('voiceBtn');
  
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = function() {
    isListening = true;
    voiceBtn.classList.add('listening');
    voiceBtn.textContent = '🎙️';
  };

  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    document.getElementById('chatInput').value = transcript;
    autoResize(document.getElementById('chatInput'));
  };

  recognition.onend = function() {
    stopVoiceInput();
  };

  recognition.onerror = function(event) {
    console.error('Speech recognition error:', event.error);
    stopVoiceInput();
  };

  recognition.start();
}

function stopVoiceInput() {
  if (recognition) {
    recognition.stop();
  }
  isListening = false;
  const voiceBtn = document.getElementById('voiceBtn');
  voiceBtn.classList.remove('listening');
  voiceBtn.textContent = '🎤';
}

  console.log('Initializing app, setup complete:', isSetupComplete, 'step:', setupStep);
  
  // Always update the welcome message first
  showWelcomeMessage();
  
  if (!isSetupComplete) {
    // Start setup mode
    if (setupStep === 0) {
      // First time - show initial setup message
      setTimeout(() => {
        appendMessage('ai', setupQuestions[0]);
        chatHistory.push({ role: 'assistant', content: setupQuestions[0] });
      }, 500);
    } else {
      // Continuing setup - show current question
      setTimeout(() => {
        appendMessage('ai', setupQuestions[setupStep]);
        chatHistory.push({ role: 'assistant', content: setupQuestions[setupStep] });
      }, 500);
    }
  } else {
    // Normal mode - just show welcome message
    console.log('Setup complete, showing normal welcome');
  }
}

function showWelcomeMessage() {

    welcomeBubble.textContent = `Welcome! Let's set up your budget tracker. I'll ask you a few questions to understand your financial situation.`;

I know your financial situation. Just talk to me naturally! You can say things like:
• "Just spent $40 at Target"
• "Got paid $500 today" 
• "Put $100 in savings"

What's up?`;

function processSetupResponse(userMessage) {
  setupResponses[setupStep] = userMessage;
  
  // Extract information from response and update userProfile
  extractSetupInfo(userMessage, setupStep);
  
  setupStep++;
  localStorage.setItem('setupStep', setupStep);
  
  if (setupStep < setupQuestions.length) {
    // Ask next question
    setTimeout(() => {
      appendMessage('ai', setupQuestions[setupStep]);
      chatHistory.push({ role: 'assistant', content: setupQuestions[setupStep] });
    }, 1000);
  } else {
    // Setup complete
    completeSetup();
  }
}

function extractSetupInfo(message, step) {
  const lowerMessage = message.toLowerCase();
  
  switch(step) {
    case 0: // Income
      // Extract hours and rate
      const hourMatch = message.match(/(\d+)\s*hours?\s*(?:per|\/)?\s*week/i);
      const rateMatch = message.match(/\$?(\d+(?:\.\d+)?)\s*(?:per|\/)?\s*hour/i);
      
      if (hourMatch && rateMatch) {
        const hours = parseInt(hourMatch[1]);
        const rate = parseFloat(rateMatch[1]);
        const monthly = Math.round((hours * rate * 52) / 12);
        userProfile.income = `Primary job: ${hours}hrs/week at $${rate}/hr = ~$${monthly}/mo`;
      }
      break;
      
    case 1: // Other income
      if (lowerMessage.includes('depop') || lowerMessage.includes('side') || lowerMessage.includes('gig')) {
        const amountMatch = message.match(/\$?(\d+(?:\.\d+)?)/g);
        if (amountMatch) {
          userProfile.income += `\nAdditional income: ~$${amountMatch[0].replace('$', '')}/mo`;
        }
      }
      break;
      
    case 2: // Housing
      if (lowerMessage.includes('none') || lowerMessage.includes('rent.free') || lowerMessage.includes('live with')) {
        userProfile.housing = 'Rent-free (lives with family)';
      } else {
        const rentMatch = message.match(/\$?(\d+(?:\.\d+)?)/);
        if (rentMatch) {
          userProfile.housing = `Rent: $${rentMatch[1]}`;
        }
      }
      break;
      
    case 3: // Transportation
      const carPaymentMatch = message.match(/car payment[^$]*\$?(\d+(?:\.\d+)?)/gi);
      const insuranceMatch = message.match(/insurance[^$]*\$?(\d+(?:\.\d+)?)/i);
      const gasMatch = message.match(/gas[^$]*\$?(\d+(?:\.\d+)?)/i);
      
      userProfile.transportation = '';
      if (carPaymentMatch) {
        carPaymentMatch.forEach(match => {
          const amount = match.match(/\$?(\d+(?:\.\d+)?)/);
          if (amount) userProfile.transportation += `Car payment: $${amount[1]}\n`;
        });
      }
      if (insuranceMatch) {
        const amount = insuranceMatch[1];
        userProfile.transportation += `Insurance: $${amount}\n`;
      }
      if (gasMatch) {
        const amount = gasMatch[1];
        userProfile.transportation += `Gas: ~$${amount}/mo\n`;
      }
      break;
      
    case 4: // Utilities and subscriptions
      // This will be complex - extract various bills
      userProfile.utilities = message;
      break;
      
    case 5: // Debts
      userProfile.debts = message;
      break;
      
    case 6: // Savings goal
      const goalMatch = message.match(/\$?(\d+(?:,\d+)?(?:\.\d+)?)/);
      if (goalMatch) {
        savingsGoal = parseInt(goalMatch[1].replace(',', ''));
        localStorage.setItem('savingsGoal', savingsGoal);
      }
      break;
      
    case 7: // Other context
      userProfile.otherContext = message;
      break;
  }
  
  localStorage.setItem('userProfile', JSON.stringify(userProfile));
}

function completeSetup() {
  isSetupComplete = true;
  localStorage.setItem('setupComplete', 'true');
  
  // Generate summary
  const summary = generateFinancialSummary();
  
  setTimeout(() => {
    appendMessage('ai', `Perfect! I've got everything I need. Here's your complete financial overview:

${summary}

You can now start tracking expenses! Just tell me about purchases, income, or savings anytime. I can also help you manage recurring bills and track your progress toward your $${savingsGoal} goal.

What would you like to do first?`);
    chatHistory.push({ role: 'assistant', content: `Setup complete! Here's your financial summary...` });
  }, 1000);
  
  // Update UI
  updateGoalBar();
  showWelcomeMessage();
}

function resetSetup() {
  localStorage.removeItem('setupComplete');
  localStorage.removeItem('setupStep');
  localStorage.removeItem('userProfile');
  localStorage.removeItem('budgetStrategy');
  localStorage.removeItem('savingsGoal');
  isSetupComplete = false;
  setupStep = 0;
  userProfile = {};
  budgetStrategy = 'budget';
  savingsGoal = 6000;
  
  // Clear chat and restart
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = `
    <div class="msg ai" id="welcomeMessage">
      <div class="bubble" id="welcomeBubble">Loading...</div>
      <div class="msg-time">Now</div>
    </div>
  `;
  
  initializeApp();
  updateGoalBar();
  renderLedger();
  renderRecurringItems();
  renderBills();
}

// Init
console.log('Starting initialization...');
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM loaded, initializing app...');
  initializeApp();
  updateGoalBar();
  renderLedger();
  renderRecurringItems();
});

// Debug: Reset setup with Ctrl+Shift+R
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'R') {
    e.preventDefault();
    console.log('Resetting setup...');
    resetSetup();
  }
});
</script>
